name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pipeline-pytest:
    name: Pipeline · pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/pipeline
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run tests (coverage + allure)
        run: python -m pytest tests/ -q
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-pipeline
          path: apps/pipeline/allure-results

  assistant-pytest:
    name: Explorer · pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/explorer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt
      - name: Run offline unit tests (coverage + allure)
        run: python -m pytest tests/ -q
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-explorer
          path: apps/explorer/allure-results

  shell-frontend:
    name: Suite Shell · vitest + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/shell
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/shell/package-lock.json
      - run: npm ci
      - run: npx vitest run --coverage
      - run: npm run build
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-shell
          path: apps/shell/allure-results

  pipeline-ui-frontend:
    name: Pipeline UI · vitest + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/pipeline/ui/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/pipeline/ui/frontend/package-lock.json
      - run: npm ci
      - run: npx vitest run --coverage
      - run: npm run build
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-pipeline-ui
          path: apps/pipeline/ui/frontend/allure-results

  allure-report:
    name: Allure · combined report
    runs-on: ubuntu-latest
    needs: [pipeline-pytest, assistant-pytest, shell-frontend, pipeline-ui-frontend]
    if: always()
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: allure-*
          path: allure-artifacts
      - name: Merge Allure results
        run: |
          mkdir -p allure-results
          find allure-artifacts -mindepth 2 -type f -exec cp {} allure-results/ \;
          echo "Merged $(ls allure-results | wc -l) Allure result files"
      - name: Generate Allure report
        run: |
          npm install -g allure-commandline
          allure generate allure-results -o allure-report --clean
      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-report
          path: allure-report
