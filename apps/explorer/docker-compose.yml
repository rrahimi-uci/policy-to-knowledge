services:
  # ── Cassandra (storage backend) ──────────────────────────────────
  cassandra:
    image: cassandra:4.1
    container_name: jg-cassandra
    ports:
      - "${CASSANDRA_PORT:-9042}:9042"
    environment:
      - CASSANDRA_START_RPC=true
      - CASSANDRA_CLUSTER_NAME=${CASSANDRA_CLUSTER_NAME:-jg-cluster}
      - MAX_HEAP_SIZE=${CASSANDRA_MAX_HEAP:-512M}
      - HEAP_NEWSIZE=${CASSANDRA_HEAP_NEWSIZE:-128M}
    volumes:
      - cassandra-data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE KEYSPACES'"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── OpenSearch (indexing + vector search backend) ───────────────
  opensearch:
    image: opensearchproject/opensearch:2.17.1
    container_name: jg-opensearch
    ports:
      - "${OPENSEARCH_PORT:-9200}:9200"
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - compatibility.override_main_response_version=true
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_ADMIN_PASSWORD:-Admin_12345!}
      - OPENSEARCH_JAVA_OPTS=${OPENSEARCH_JAVA_OPTS:--Xms256m -Xmx256m}
      - DISABLE_INSTALL_DEMO_CONFIG=true
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Redis (caching layer) ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: jg-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory ${REDIS_MAX_MEMORY:-256mb} --maxmemory-policy ${REDIS_EVICTION_POLICY:-allkeys-lru}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── JanusGraph (Multi-Graph Support) ─────────────────────────────
  janusgraph:
    image: janusgraph/janusgraph:1.0.0
    container_name: jg-server
    ports:
      - "${JANUSGRAPH_PORT:-8182}:8182"
    # Cap the JVM heap and container memory so JanusGraph fits on memory-
    # constrained hosts. Without a cap the JVM sizes its heap to a fraction of
    # total host RAM, which can trigger an OOM kill when other stacks are
    # running. Override via JANUSGRAPH_MEM_LIMIT / JAVA_OPTIONS if you have room.
    mem_limit: ${JANUSGRAPH_MEM_LIMIT:-2g}
    environment:
      JAVA_OPTIONS: ${JANUSGRAPH_JAVA_OPTIONS:--Xms256m -Xmx1024m}
    volumes:
      # Mount the entire conf/ directory (auto-generated from graphs.yaml).
      # This supports any number of graphs without changing docker-compose.yml.
      - ./conf:/opt/janusgraph/conf-graphs:ro
    # Override entrypoint and command to start server with custom config
    entrypoint: []
    command: ["/bin/bash", "-c", "cd /opt/janusgraph && exec bin/janusgraph-server.sh conf-graphs/gremlin-server.yaml"]
    depends_on:
      cassandra:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "cd /opt/janusgraph && bin/gremlin.sh -e scripts/empty-sample.groovy 2>/dev/null || exit 0"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s

volumes:
  cassandra-data:
  opensearch-data:
  redis-data:
