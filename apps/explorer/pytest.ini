[pytest]
testpaths = tests
# Unit tests only. Integration (live JanusGraph/OpenSearch) and Playwright e2e
# live under tests/integration and tests/e2e and are run explicitly, not in CI.
addopts =
    -q
    --ignore=tests/integration
    --ignore=tests/e2e
    --cov
    --cov-report=term-missing
    --cov-report=html:coverage-html
    --cov-report=xml:coverage.xml
    --alluredir=allure-results
    --clean-alluredir
