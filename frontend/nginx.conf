# nginx.conf template — ${BASE_PATH} substituted at Docker build time
server {
    listen 4000;
    client_max_body_size 500M;

    # We sit behind an HTTPS reverse proxy (ACA / nginx gateway) that
    # terminates TLS on 443 and forwards to us on :4000. Make all 301s
    # relative so the public scheme/host/port from the browser are kept.
    absolute_redirect off;
    port_in_redirect off;
    server_name_in_redirect off;

    root /usr/share/nginx/html;
    index index.html;

    # ── API proxies ───────────────────────────────────────────────
    # In ACA, internal DNS resolves to the env's L7 router on :80 (which
    # forwards to each app's targetPort). Hitting the targetPort directly
    # (e.g. :5000, :8000, :5173) times out. In docker-compose these names
    # also resolve and the upstream listens on :80 by default — so omit
    # the port entirely for portability.
    location ${BASE_PATH}/api/kg/ {
        proxy_pass http://kg-backend/api/;
        proxy_set_header Host kg-backend;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ${BASE_PATH}/api/ca/ {
        proxy_pass http://assistant${BASE_PATH}/api/;
        proxy_set_header Host assistant;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Reference endpoints are generated by assistant as
    # /app/api/reference/<...> (without /api/ca). Route them to
    # assistant before the generic /api/ catch-all.
    location ${BASE_PATH}/api/reference/ {
        proxy_pass http://assistant${BASE_PATH}/api/reference/;
        proxy_set_header Host assistant;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
    }

    # Catch-all for kg-backend API. The embedded kg-frontend SPA calls
    # `/api/<...>` (relative, VITE_API_BASE_PREFIX is empty) — these get
    # 301'd by the catch-all `location /` to `/app/api/<...>` and must
    # land on kg-backend, not the SPA fallback (which returns index.html
    # and breaks JSON parsing). Specific /api/ca/ above still wins.
    location ${BASE_PATH}/api/ {
        proxy_pass http://kg-backend/api/;
        proxy_set_header Host kg-backend;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        client_max_body_size 500M;
    }

    # ── WebSocket proxy ───────────────────────────────────────────
    location ${BASE_PATH}/ws/kg/ {
        proxy_pass http://kg-backend/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host kg-backend;
        proxy_read_timeout 86400;
    }

    # Catch-all WS for embedded kg-frontend (calls `/ws/...` relative).
    location ${BASE_PATH}/ws/ {
        proxy_pass http://kg-backend/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host kg-backend;
        proxy_read_timeout 86400;
    }

    # ── kg-frontend (embedded SPA) ────────────────────────────────
    # Mount kg-frontend's routes under the same base path so the suite
    # can iframe them via same-origin URLs (e.g. /app/pipeline?embedded=true).
    # kg-frontend builds its hashed bundles under /app/kg-assets/ to avoid
    # colliding with the suite-shell's /app/assets/.
    location ${BASE_PATH}/kg-assets/ {
        proxy_pass http://kg-frontend${BASE_PATH}/kg-assets/;
        proxy_set_header Host kg-frontend;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^${BASE_PATH}/(documents|pipeline|explorer|compare|runs|settings)(/.*)?$ {
        proxy_pass http://kg-frontend$request_uri;
        proxy_set_header Host kg-frontend;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── assistant (embedded UI) ────────────────────────────
    # The suite-shell's <Assistant /> page iframes the assistant under a
    # same-origin path so VITE_CA_URL can be a relative URL (e.g. /app/ca-ui/)
    # instead of the suite-shell's own public FQDN — that previously caused
    # the iframe to recurse into the suite-shell SPA and render the sidebar
    # twice (or three times). The trailing slash in the upstream's path is
    # important: it strips ${BASE_PATH}/ca-ui from the proxied URL so the
    # assistant container receives /app/<rest>, matching its own
    # URL_PREFIX=/app.
    location ${BASE_PATH}/ca-ui/ {
        rewrite ^${BASE_PATH}/ca-ui/(.*)$ ${BASE_PATH}/$1 break;
        proxy_pass http://assistant;
        proxy_set_header Host assistant;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 500M;
    }

    # ── Static assets (cache forever) ────────────────────────────
    # `alias` strips the BASE_PATH prefix so /app/assets/foo.js
    # resolves to /usr/share/nginx/html/assets/foo.js (Vite emits
    # bundles into dist/assets/, not dist/app/assets/).
    location ${BASE_PATH}/assets/ {
        alias /usr/share/nginx/html/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA fallback ──────────────────────────────────────────────
    # Vite emits dist/index.html (asset URLs prefixed by ${BASE_PATH}).
    # `alias` strips BASE_PATH so static files (favicons, public/*)
    # resolve correctly, and the named @spa fallback avoids matching
    # the catch-all `location /` (which would 301-loop).
    location ${BASE_PATH}/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ @spa;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    location @spa {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        try_files /index.html =404;
    }

    # ── Root redirect ─────────────────────────────────────────────
    # IF_BASE_PATH_BEGIN  (stripped at build time when BASE_PATH is empty)
    # Normalize accidental double-prefix URLs produced by some refresh flows.
    # Use exact/prefix locations (not regex) so nginx location selection is
    # deterministic and wins over the SPA fallback prefix location.
    location = ${BASE_PATH}${BASE_PATH} {
        return 301 ${BASE_PATH}/;
    }

    location = ${BASE_PATH}${BASE_PATH}/ {
        return 301 ${BASE_PATH}/;
    }

    location ${BASE_PATH}${BASE_PATH}/ {
        rewrite ^${BASE_PATH}${BASE_PATH}/(.*)$ ${BASE_PATH}/$1 permanent;
    }

    location = ${BASE_PATH} {
        return 301 ${BASE_PATH}/;
    }

    location = / {
        return 301 ${BASE_PATH}/;
    }

    # ── Catch-all: any path not under BASE_PATH → redirect ────────
    location / {
        return 301 ${BASE_PATH}$request_uri;
    }
    # IF_BASE_PATH_END
}
