name: UI Playwright

on:
  pull_request:
    paths:
      - "pipeline/ui/frontend/**"
      - "pipeline/ui/README.md"
      - "pipeline/.github/workflows/ui-playwright.yml"
  push:
    branches:
      - main
      - dev
    paths:
      - "pipeline/ui/frontend/**"
      - "pipeline/ui/README.md"
      - "pipeline/.github/workflows/ui-playwright.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: pipeline/ui/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pipeline/ui/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright UI tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ui/frontend/playwright-report
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: ui/frontend/test-results
          if-no-files-found: ignore
          retention-days: 14
