# nginx.conf template — ${BASE_PATH} substituted at Docker build time
server {
    listen 5173;
    client_max_body_size 500M;

    # Behind ACA HTTPS proxy on 443 → forwarded to 5173. Make redirects
    # relative so the public scheme/host/port from the browser are kept.
    absolute_redirect off;
    port_in_redirect off;
    server_name_in_redirect off;

    root /usr/share/nginx/html;
    index index.html;

    # Assistant API proxy (ACA internal — port 80, Host = app name)
    location ${BASE_PATH}/api/ca/ {
        proxy_pass http://assistant${BASE_PATH}/api/;
        proxy_set_header Host assistant;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
    }

    # KG Backend API proxy
    location ${BASE_PATH}/api/ {
        proxy_pass http://kg-backend/api/;
        proxy_set_header Host kg-backend;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket proxy
    location ${BASE_PATH}/ws/ {
        proxy_pass http://kg-backend/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host kg-backend;
        proxy_read_timeout 86400;
    }

    # Hashed assets – cache forever (output dir overridden in vite.config.ts
    # to 'kg-assets' so it doesn't collide with suite-shell's /app/assets/
    # when this app is proxied under the same base path).
    # `alias` strips BASE_PATH so /app/kg-assets/foo.js resolves to
    # /usr/share/nginx/html/kg-assets/foo.js (Vite emits dist/kg-assets/).
    location ${BASE_PATH}/kg-assets/ {
        alias /usr/share/nginx/html/kg-assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback
    # `alias` strips BASE_PATH so static files resolve correctly, and the
    # named @spa fallback avoids matching the catch-all `location /` (which
    # would 301-loop into /app/app/...) and avoids re-matching itself
    # (which caused "rewrite or internal redirection cycle" 500s).
    location ${BASE_PATH}/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ @spa;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    location @spa {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        try_files /index.html =404;
    }

    # Root redirect
    # IF_BASE_PATH_BEGIN  (stripped at build time when BASE_PATH is empty)
    location = / {
        return 301 ${BASE_PATH}/;
    }

    # Catch-all: redirect any path not under BASE_PATH to BASE_PATH + original path
    location / {
        return 301 ${BASE_PATH}$request_uri;
    }
    # IF_BASE_PATH_END
}
